<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rina Birthday SP Gacha</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="y2k-orbit" aria-hidden="true">
      <span class="spark s1"></span>
      <span class="spark s2"></span>
      <span class="spark s3"></span>
      <span class="heart h1"></span>
      <span class="heart h2"></span>
      <span class="track-label t1">TRACK 09</span>
      <span class="track-label t2">PLAY MODE</span>
      <span class="track-label t3">RINA.exe</span>
    </div>
    <div id="disc-preview" class="disc-preview cd-disc" aria-hidden="true">
      <span class="disc-text">Rina生日快乐</span>
    </div>
    <main class="app-shell">
      <section class="machine-zone" aria-labelledby="page-title">
        <div class="top-strip">
          <span>Rina Birthday SP</span>
          <div class="top-actions">
            <span>CD trigger gacha</span>
            <button id="sound-toggle" class="sound-toggle" type="button" aria-pressed="false">SFX ON</button>
          </div>
        </div>

        <div class="stage">
          <section class="poster-panel">
            <p class="kicker">Y2K Concert Toy System</p>
            <h1 id="page-title">Rina Birthday SP</h1>
            <p class="subcopy">把给 Rina 的祝福刻进限定光盘，推入唱片机关，透明音乐玩具开始旋转，最后掉出一颗生日扭蛋。</p>
            <div class="quick-stats" aria-label="抽奖信息">
              <span><b id="remaining-count">12</b> 个奖品</span>
              <span><b id="draw-count">0</b> 次抽取</span>
            </div>
          </section>

          <section class="gacha-card" aria-label="光盘触发扭蛋机">
            <div class="machine">
              <div class="kitty-topper" aria-hidden="true">
                <span class="kitty-ear left"></span>
                <span class="kitty-ear right"></span>
                <span class="kitty-face">
                  <i class="eye left"></i>
                  <i class="eye right"></i>
                  <i class="nose"></i>
                  <i class="whiskers left"></i>
                  <i class="whiskers right"></i>
                </span>
                <span class="kitty-bow"><i></i></span>
                <span class="kitty-paw left"></span>
                <span class="kitty-paw right"></span>
              </div>
              <div class="marquee">
                <span>Void</span>
                <span>Rina</span>
                <span>SP</span>
              </div>
              <div class="coin-meter" aria-live="polite">
                <span>Disc Drive</span>
                <b id="coin-count">READY</b>
                <div class="coin-pips" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
              </div>
              <div class="glass">
                <div class="glass-stickers" aria-hidden="true">
                  <span class="sticker bow"></span>
                  <span class="sticker heart"></span>
                  <span class="sticker berry"></span>
                  <span class="sticker candy"></span>
                  <span class="sticker icecream"></span>
                </div>
                <div class="kitty-label" aria-hidden="true">RINA LIVE</div>
                <div class="capsules" aria-hidden="true">
                  <span class="capsule cap-1"></span>
                  <span class="capsule cap-2"></span>
                  <span class="capsule cap-3"></span>
                  <span class="capsule cap-4"></span>
                  <span class="capsule cap-5"></span>
                  <span class="capsule cap-6"></span>
                  <span class="capsule cap-7"></span>
                  <span class="capsule cap-8"></span>
                  <span class="capsule cap-9"></span>
                  <span class="capsule cap-10"></span>
                  <span class="capsule cap-11"></span>
                  <span class="capsule cap-12"></span>
                  <span class="capsule cap-13"></span>
                  <span class="capsule cap-14"></span>
                  <span class="capsule cap-15"></span>
                  <span class="capsule cap-16"></span>
                  <span class="capsule cap-17"></span>
                  <span class="capsule cap-18"></span>
                  <span class="capsule cap-19"></span>
                  <span class="capsule cap-20"></span>
                  <span class="capsule cap-21"></span>
                  <span class="capsule cap-22"></span>
                  <span class="capsule cap-23"></span>
                  <span class="capsule cap-24"></span>
                </div>
                <div class="shine"></div>
              </div>
              <div class="body">
                <div class="disc-message-panel">
                  <label for="disc-message">刻到光盘上的一句话</label>
                  <div class="disc-message-row">
                    <input id="disc-message" type="text" maxlength="18" value="Rina生日快乐" autocomplete="off" />
                    <span id="disc-message-count">0/18</span>
                  </div>
                </div>
                <div class="coin-slot cd-drive" aria-hidden="true">
                  <span class="slot-line"></span>
                  <span class="coin cd-disc"><span class="disc-text">Rina生日快乐</span></span>
                </div>
                <button id="draw-button" class="draw-button" type="button">
                  <span class="button-icon" aria-hidden="true">◆</span>
                  <span>放入光盘</span>
                </button>
                <div class="turn-knob cd-reader" aria-hidden="true">
                  <span></span>
                </div>
                <div class="outlet" aria-hidden="true">
                  <span id="drop-capsule" class="drop-capsule"></span>
                </div>
              </div>
            </div>
          </section>
        </div>

        <section class="prize-board" aria-label="奖品列表">
          <div class="section-title">
            <h2>奖品池</h2>
            <button id="reset-button" class="icon-button" type="button" title="清空本机记录" aria-label="清空本机记录">↻</button>
          </div>
          <div id="prize-list" class="prize-list"></div>
        </section>
      </section>
    </main>

    <dialog id="result-dialog" class="result-dialog" aria-labelledby="result-title">
      <div class="result-window">
        <div class="dialog-bar">
          <span>gacha_result.exe</span>
          <button id="close-dialog" class="window-button" type="button" aria-label="关闭">×</button>
        </div>
        <div class="result-content">
          <p class="result-label">你抽中了</p>
          <h2 id="result-title">奖品名称</h2>
          <p id="result-desc"></p>
          <div id="result-rarity" class="rarity-chip"></div>
          <button id="again-button" class="secondary-button" type="button">再放一次</button>
        </div>
      </div>
    </dialog>

    <canvas id="confetti-canvas" aria-hidden="true"></canvas>
    <script src="./script.js"></script>
  </body>
</html>
